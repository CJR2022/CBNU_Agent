<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBNU Agent</title>
    <style>
        :root {
            --cbnu-red: #c44b4b;
            --cbnu-red-dark: #a33b3b;
            --cbnu-red-light: #fdf2f2;
            --cbnu-red-soft: rgba(196, 75, 75, 0.12);
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1f1f1f;
            --text-secondary: #5f6368;
            --border: #e8eaed;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 1rem;
            --radius-sm: 0.625rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--cbnu-red) 0%, var(--cbnu-red-dark) 100%);
            color: white;
            padding: 0.875rem 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            width: 2.25rem;
            height: 2.25rem;
            background: white;
            color: var(--cbnu-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            margin: 0.125rem 0 0;
            font-size: 0.75rem;
            opacity: 0.92;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .welcome-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--cbnu-red);
            animation: slideUp 0.4s ease-out;
        }

        .welcome-card h2 {
            margin: 0 0 0.5rem;
            font-size: 1.1rem;
            color: var(--cbnu-red);
        }

        .welcome-card p {
            margin: 0;
            font-size: 0.9375rem;
            line-height: 1.55;
            color: var(--text-secondary);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.875rem;
        }

        .chip {
            background: var(--cbnu-red-light);
            color: var(--cbnu-red);
            border: 1px solid rgba(183, 28, 28, 0.15);
            border-radius: 9999px;
            padding: 0.5rem 0.875rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background: var(--cbnu-red);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(183, 28, 28, 0.25);
        }

        .message {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: var(--radius);
            line-height: 1.6;
            white-space: pre-wrap;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease-out;
            transition: box-shadow 0.2s ease;
        }

        .message:hover {
            box-shadow: var(--shadow-hover);
        }

        .message.user {
            align-self: flex-end;
            background: var(--cbnu-red);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--surface);
            border-bottom-left-radius: 0.25rem;
        }

        .message.bot a {
            color: var(--cbnu-red);
            text-decoration: none;
            font-weight: 500;
        }

        .message.bot a:hover {
            text-decoration: underline;
        }

        .sources {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .sources summary {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .sources summary::before {
            content: "▸";
            transition: transform 0.2s ease;
        }

        .sources[open] summary::before {
            transform: rotate(90deg);
        }

        .source-cards {
            display: grid;
            gap: 0.5rem;
            margin-top: 0.625rem;
        }

        .source-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-sm);
            background: var(--bg);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .source-card:hover {
            border-color: var(--cbnu-red);
            background: var(--cbnu-red-light);
            transform: translateX(2px);
        }

        .source-card .favicon {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            background: var(--cbnu-red);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .source-card .url-text {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            word-break: break-all;
            line-height: 1.4;
        }

        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 0.875rem 1rem;
            display: flex;
            gap: 0.625rem;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.04);
        }

        .input-area input {
            flex: 1;
            padding: 0.875rem 1.125rem;
            border: 1px solid var(--border);
            border-radius: 9999px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            background: var(--bg);
        }

        .input-area input:focus {
            border-color: var(--cbnu-red);
            background: white;
            box-shadow: 0 0 0 3px rgba(183, 28, 28, 0.1);
        }

        .input-area button {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 9999px;
            background: var(--cbnu-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:hover:not(:disabled) {
            background: var(--cbnu-red-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(183, 28, 28, 0.25);
        }

        .input-area button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .loading {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding-left: 0.25rem;
            animation: slideUp 0.3s ease-out;
        }

        .loading::before {
            content: "";
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--cbnu-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .message {
                max-width: 92%;
            }

            .input-area button {
                padding: 0.875rem 1.125rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>CBNU Agent</h1>
            <p>충북대학교 정보 안내 챗봇</p>
        </div>
    </header>

    <main id="chat" aria-live="polite" aria-atomic="false">
        <div class="welcome-card">
            <h2>안녕하세요! CBNU Agent입니다.</h2>
            <p>기숙사 식단, 학사/학과 공지 등 충북대 생활 정보를 편하게 물어보세요.</p>
            <div class="chips" id="chips">
                <button class="chip" data-query="오늘 양성재 메뉴 뭐야?">오늘 양성재 메뉴</button>
                <button class="chip" data-query="기숙사 생활관비 납부 언제까지야?">기숙사 생활관비 납부</button>
                <button class="chip" data-query="소프트웨어학부 최근 공지 알려줘">소프트웨어학부 최근 공지</button>
                <button class="chip" data-query="기숙사 최근 공지 알려줘">기숙사 최근 공지</button>
            </div>
        </div>
    </main>

    <form class="input-area" id="chat-form">
        <label for="user-input" class="sr-only">질문 입력</label>
        <input type="text" id="user-input" placeholder="질문을 입력하세요..." autocomplete="off" />
        <button type="submit" id="send-btn">전송</button>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function renderMarkdown(text) {
            let html = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            html = html.replace(/(?!<[^>]*)(https?:\/\/[^\s<"]+)(?![^<]*<\/a>)/g, (match) => {
                return `<a href="${match}" target="_blank" rel="noopener noreferrer">${match}</a>`;
            });
            return html;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getDomainFavicon(url) {
            try {
                const domain = new URL(url).hostname.replace(/^www\./, '');
                return domain.split('.')[0].slice(0, 2).toUpperCase();
            } catch {
                return 'CB';
            }
        }

        function appendMessage(text, sender, sources = []) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${sender}`;

            const textDiv = document.createElement('div');
            textDiv.innerHTML = renderMarkdown(escapeHtml(text)).replace(/\n/g, '<br>');
            wrapper.appendChild(textDiv);

            if (sources && sources.length > 0) {
                const details = document.createElement('details');
                details.className = 'sources';

                const summary = document.createElement('summary');
                summary.textContent = `출처 (${sources.length}개)`;
                details.appendChild(summary);

                const cards = document.createElement('div');
                cards.className = 'source-cards';
                sources.forEach(url => {
                    const card = document.createElement('a');
                    card.className = 'source-card';
                    card.href = url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';

                    const favicon = document.createElement('div');
                    favicon.className = 'favicon';
                    favicon.textContent = getDomainFavicon(url);

                    const urlText = document.createElement('span');
                    urlText.className = 'url-text';
                    urlText.textContent = url;

                    card.appendChild(favicon);
                    card.appendChild(urlText);
                    cards.appendChild(card);
                });
                details.appendChild(cards);
                wrapper.appendChild(details);
            }

            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            input.disabled = isLoading;
            if (isLoading) {
                const loading = document.createElement('div');
                loading.className = 'loading';
                loading.id = 'loading';
                loading.textContent = '답변을 생성 중입니다...';
                chat.appendChild(loading);
                chat.scrollTop = chat.scrollHeight;
            } else {
                const loading = document.getElementById('loading');
                if (loading) loading.remove();
            }
        }

        async function sendMessage(text) {
            if (!text.trim()) return;
            appendMessage(text, 'user');
            input.value = '';
            setLoading(true);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: 'web' })
                });
                const data = await res.json();
                appendMessage(data.answer, 'bot', data.sources);
            } catch (err) {
                appendMessage('서버와 통신 중 오류가 발생했습니다.', 'bot');
            } finally {
                setLoading(false);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await sendMessage(input.value);
        });

        document.getElementById('chips').addEventListener('click', (e) => {
            const chip = e.target.closest('.chip');
            if (chip) {
                const query = chip.dataset.query;
                input.value = query;
                sendMessage(query);
            }
        });
    </script>
</body>
</html>
