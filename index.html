<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBNU Agent</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --bubble-user: #e8f0fe;
            --bubble-bot: #ffffff;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }

        header p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 85%;
            padding: 0.875rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: var(--shadow);
        }

        .message.user {
            align-self: flex-end;
            background: var(--bubble-user);
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bubble-bot);
            border-bottom-left-radius: 0.25rem;
        }

        .sources {
            margin-top: 0.5rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .sources a {
            color: var(--primary);
            word-break: break-all;
        }

        .sources ul {
            margin: 0.25rem 0 0;
            padding-left: 1.25rem;
        }

        .sources li {
            margin-bottom: 0.25rem;
        }

        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 0.875rem 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 1.5rem;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .input-area button:hover {
            background: var(--primary-dark);
        }

        .input-area button:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .loading {
            align-self: flex-start;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding-left: 0.25rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 92%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>CBNU Agent</h1>
            <p>충북대학교 정보 안내 챗봇</p>
        </div>
    </header>

    <main id="chat" aria-live="polite" aria-atomic="false">
        <div class="message bot">안녕하세요! 충북대학교 정보 안내 챗봇 CBNU Agent입니다.
기숙사 식단, 학사/학과 공지 등에 대해 물어보세요.
</div>
    </main>

    <form class="input-area" id="chat-form">
        <label for="user-input" class="sr-only">질문 입력</label>
        <input type="text" id="user-input" placeholder="질문을 입력하세요..." autocomplete="off" />
        <button type="submit" id="send-btn">전송</button>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function renderMarkdown(text) {
            // HTML 이스케이프된 텍스트를 받아 간단한 Markdown을 HTML로 변환
            // 1. 볼드 **텍스트** → <strong>텍스트</strong>
            let html = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            // 2. [텍스트](URL) → <a href="URL">텍스트</a>
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            // 3. 아직 링크로 변환되지 않은 단독 URL만 클릭 가능한 링크로 변환
            //    <a ...> 난이나 </a> 태그 난부의 URL은 제외
            html = html.replace(/(?!<[^>]*)(https?:\/\/[^\s<"]+)(?![^\u003c]*<\/a>)/g, (match) => {
                return `<a href="${match}" target="_blank" rel="noopener noreferrer">${match}</a>`;
            });
            return html;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function appendMessage(text, sender, sources = [], confidence = '') {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${sender}`;

            const textDiv = document.createElement('div');
            // HTML 이스케이프 후 Markdown 변환
            textDiv.innerHTML = renderMarkdown(escapeHtml(text)).replace(/\n/g, '<br>');
            wrapper.appendChild(textDiv);

            if (confidence === 'low') {
                const warning = document.createElement('div');
                warning.style.marginTop = '0.5rem';
                warning.style.fontSize = '0.8125rem';
                warning.style.color = '#c58940';
                warning.textContent = '[참고] 답변 근거가 충분하지 않을 수 있습니다.';
                wrapper.appendChild(warning);
            }

            if (sources && sources.length > 0) {
                const details = document.createElement('details');
                details.className = 'sources';
                details.style.marginTop = '0.5rem';

                const summary = document.createElement('summary');
                summary.textContent = `출처 (${sources.length}개)`;
                summary.style.cursor = 'pointer';
                summary.style.color = 'var(--primary)';
                details.appendChild(summary);

                const ul = document.createElement('ul');
                ul.style.marginTop = '0.25rem';
                sources.forEach(url => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = url;
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                details.appendChild(ul);
                wrapper.appendChild(details);
            }

            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            input.disabled = isLoading;
            if (isLoading) {
                const loading = document.createElement('div');
                loading.className = 'loading';
                loading.id = 'loading';
                loading.textContent = '답변을 생성 중입니다...';
                chat.appendChild(loading);
                chat.scrollTop = chat.scrollHeight;
            } else {
                const loading = document.getElementById('loading');
                if (loading) loading.remove();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';
            setLoading(true);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: 'web' })
                });
                const data = await res.json();
                appendMessage(data.answer, 'bot', data.sources, data.confidence);
            } catch (err) {
                appendMessage('서버와 통신 중 오류가 발생했습니다.', 'bot');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
