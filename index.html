<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBNU Agent</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --bubble-user: #e8f0fe;
            --bubble-bot: #ffffff;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }

        header p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 85%;
            padding: 0.875rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: var(--shadow);
        }

        .message.user {
            align-self: flex-end;
            background: var(--bubble-user);
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bubble-bot);
            border-bottom-left-radius: 0.25rem;
        }

        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 0.875rem 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 1.5rem;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .input-area button:hover {
            background: var(--primary-dark);
        }

        .input-area button:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .loading {
            align-self: flex-start;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding-left: 0.25rem;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 92%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>CBNU Agent</h1>
            <p>충북대학교 정보 안내 챗봇</p>
        </div>
    </header>

    <main id="chat">
        <div class="message bot">안녕하세요! 충북대학교 정보 안내 챗봇 CBNU Agent입니다.
기숙사 식단, 학사/학과 공지 등에 대해 물어보세요.
</div>
    </main>

    <form class="input-area" id="chat-form">
        <input type="text" id="user-input" placeholder="질문을 입력하세요..." autocomplete="off" />
        <button type="submit" id="send-btn">전송</button>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            input.disabled = isLoading;
            if (isLoading) {
                const loading = document.createElement('div');
                loading.className = 'loading';
                loading.id = 'loading';
                loading.textContent = '답변을 생성 중입니다...';
                chat.appendChild(loading);
                chat.scrollTop = chat.scrollHeight;
            } else {
                const loading = document.getElementById('loading');
                if (loading) loading.remove();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';
            setLoading(true);

            // TODO: 백엔드 API 연동 시 아래 URL을 실제 엔드포인트로 교체
            // const res = await fetch('/api/chat', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ message: text })
            // });
            // const data = await res.json();
            // appendMessage(data.answer, 'bot');

            // 현재는 데모 응답
            setTimeout(() => {
                setLoading(false);
                appendMessage('아직 백엔드 API가 연결되지 않았습니다. 서버 연동 후 이 메시지가 실제 답변으로 대첼됩니다.', 'bot');
            }, 800);
        });
    </script>
</body>
</html>
